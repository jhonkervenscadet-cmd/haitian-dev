<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>DesignRush Widget</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    /* Simple spinner styles */
    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100px;
      color: #71717a;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div 
    data-designrush-widget 
    data-agency-id="119531" 
    data-style="dark" 
    aria-label="DesignRush agency reviews section"
  >
    <div class="loader">Loading DesignRush Reviews...</div>
  </div>

  <script type="text/javascript" src="https://www.designrush.com/topbest/js/widgets/agency-reviews.js"></script>
  <noscript>
    <a href="https://www.designrush.com/agency/profile/haitian-d-e-v#reviews" target="_blank" aria-label="Visit Haitian D.E.V. reviews on DesignRush">REVIEW US ON DESIGNRUSH</a>
  </noscript>
</body>
</html>
