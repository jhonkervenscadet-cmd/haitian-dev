    <link rel="icon" type="image/png" sizes="48x48" href="https://i.postimg.cc/BtWHr8yk/haitiandev-(2).png" />

    <link rel="apple-touch-icon" href="https://i.postimg.cc/BtWHr8yk/haitiandev-(2).png" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isDev = window.location.hostname === 'localhost' || 
                        window.location.hostname.includes('127.0.0.1') || 
                        window.location.hostname.includes('-dev-');
          if (isDev) {
            // Unregister any active service worker in development to avoid cache conflicts
            navigator.serviceWorker.getRegistrations().then((registrations) => {
              for (let registration of registrations) {
                registration.unregister();
              }
            });
            console.log('Service Worker disabled/unregistered in development mode.');
          } else {
            navigator.serviceWorker.register('/sw.js')
              .then((reg) => console.log('Service Worker registered successfully:', reg.scope))
              .catch((err) => console.error('Service Worker registration failed:', err));
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
